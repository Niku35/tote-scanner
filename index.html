<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>QR Scanner</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:#000;color:#fff;font-family:-apple-system,sans-serif;
    height:100vh;display:flex;flex-direction:column;overflow:hidden}

  .top{display:flex;align-items:center;justify-content:space-between;
    padding:14px 16px;background:rgba(0,0,0,.85);flex-shrink:0;
    border-bottom:1px solid rgba(255,255,255,.08)}
  .top h2{font-size:16px;font-weight:700;letter-spacing:-.2px}
  .close-btn{background:rgba(255,255,255,.12);border:none;border-radius:50%;
    width:36px;height:36px;color:#fff;font-size:18px;cursor:pointer;
    display:flex;align-items:center;justify-content:center}

  .vid-wrap{position:relative;flex:1;overflow:hidden;background:#000;min-height:0}
  video{width:100%;height:100%;object-fit:cover;display:block}
  .overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
  .qr-frame{position:relative;width:65%;aspect-ratio:1;box-shadow:0 0 0 9999px rgba(0,0,0,.52)}
  .qr-frame::before,.qr-frame::after{content:"";position:absolute;width:22px;height:22px;
    border-color:rgba(79,142,247,.95);border-style:solid}
  .qr-frame::before{top:0;left:0;border-width:3px 0 0 3px;border-radius:4px 0 0 0}
  .qr-frame::after{top:0;right:0;border-width:3px 3px 0 0;border-radius:0 4px 0 0}
  .cbl,.cbr{position:absolute;width:22px;height:22px;
    border-color:rgba(79,142,247,.95);border-style:solid;bottom:0}
  .cbl{left:0;border-width:0 0 3px 3px;border-radius:0 0 0 4px}
  .cbr{right:0;border-width:0 3px 3px 0;border-radius:0 0 4px 0}
  .scan-line{position:absolute;left:4px;right:4px;height:2px;
    background:rgba(79,142,247,.8);animation:sc 2s ease-in-out infinite}
  @keyframes sc{0%{top:6%}50%{top:90%}100%{top:6%}}

  .bottom{background:rgba(0,0,0,.92);flex-shrink:0;padding:16px 16px 24px}
  .hint{font-size:13px;color:rgba(255,255,255,.5);text-align:center;line-height:1.5}

  /* Detected panel */
  .det-panel{display:none;flex-direction:column;gap:12px}
  .det-panel.on{display:flex}
  .det-lbl{font-size:10px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.8px}
  .det-val{background:rgba(79,142,247,.15);border:1px solid rgba(79,142,247,.3);
    border-radius:10px;padding:12px 14px;font-size:14px;font-family:monospace;
    color:#7eb8ff;word-break:break-all;line-height:1.5}
  .det-btns{display:flex;gap:10px}
  .btn-confirm{flex:1;padding:16px;background:#4f8ef7;color:#fff;border:none;
    border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;letter-spacing:-.2px}
  .btn-confirm:active{opacity:.85;transform:scale(.98)}
  .btn-rescan{padding:16px 18px;background:#22263a;color:#8a90b0;border:none;
    border-radius:10px;font-size:14px;font-weight:600;cursor:pointer}

  .no-sup{font-size:13px;color:rgba(255,255,255,.4);text-align:center;
    line-height:1.7;padding:8px 0;display:none}
  .err-msg{font-size:13px;color:#f76b6b;text-align:center;line-height:1.5;display:none}
</style>
</head>
<body>

<div class="top">
  <h2 id="pageTitle">Scan QR Code</h2>
  <button class="close-btn" onclick="closeScanner()">✕</button>
</div>

<div class="vid-wrap">
  <video id="vid" playsinline autoplay muted></video>
  <div class="overlay">
    <div class="qr-frame">
      <div class="cbl"></div><div class="cbr"></div>
      <div class="scan-line"></div>
    </div>
  </div>
</div>

<div class="bottom">
  <div class="hint" id="hint">Starting camera…</div>
  <div class="err-msg" id="errMsg"></div>
  <div class="no-sup" id="noSup">
    QR detection not supported on this browser.<br>
    <small>Please use Chrome on Android.</small>
  </div>

  <div class="det-panel" id="detPanel">
    <div>
      <div class="det-lbl">Detected value</div>
      <div class="det-val" id="detVal"></div>
    </div>
    <div class="det-btns">
      <button class="btn-rescan" onclick="rescan()">Rescan</button>
      <button class="btn-confirm" onclick="confirmScan()">✓ Confirm</button>
    </div>
  </div>
</div>

<script>
var scanned = null;
var stream  = null;
var detector = null;
var raf = null;
var fieldId = '';

// Read field from URL param
var params = new URLSearchParams(window.location.search);
fieldId = params.get('field') || 'iTote';

var labels = { iTote: 'Scan Tote QR', iQr: 'Scan Order QR', rTote: 'Scan Tote QR' };
document.getElementById('pageTitle').textContent = labels[fieldId] || 'Scan QR Code';

// Start camera
navigator.mediaDevices.getUserMedia({
  video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
}).then(function(s) {
  stream = s;
  var vid = document.getElementById('vid');
  vid.srcObject = s;
  vid.onloadedmetadata = function() {
    vid.play();
    if ('BarcodeDetector' in window) {
      try { detector = new BarcodeDetector({ formats: ['qr_code'] }); }
      catch(e) { try { detector = new BarcodeDetector(); } catch(e2) { showNoSupport(); return; } }
      document.getElementById('hint').textContent = 'Point camera at QR code…';
      loop();
    } else {
      showNoSupport();
    }
  };
}).catch(function(e) {
  document.getElementById('hint').style.display = 'none';
  document.getElementById('errMsg').textContent = 'Camera error: ' + e.message;
  document.getElementById('errMsg').style.display = 'block';
});

function loop() {
  if (!detector || !stream) return;
  var vid = document.getElementById('vid');
  if (vid.readyState < 2) { raf = requestAnimationFrame(loop); return; }
  detector.detect(vid).then(function(results) {
    if (results && results.length > 0) {
      scanned = results[0].rawValue;
      if (navigator.vibrate) navigator.vibrate(80);
      document.getElementById('hint').style.display = 'none';
      document.getElementById('detVal').textContent = scanned;
      document.getElementById('detPanel').className = 'det-panel on';
    } else {
      raf = requestAnimationFrame(loop);
    }
  }).catch(function() { raf = requestAnimationFrame(loop); });
}

function confirmScan() {
  if (!scanned) return;
  // postMessage to opener — both are on script.google.com so same origin
  if (window.opener && !window.opener.closed) {
    window.opener.postMessage({ type: 'SCAN_RESULT', field: fieldId, value: scanned }, '*');
  }
  stopCam();
  window.close();
}

function rescan() {
  scanned = null;
  document.getElementById('detPanel').className = 'det-panel';
  document.getElementById('hint').style.display = 'block';
  document.getElementById('hint').textContent = 'Point camera at QR code…';
  loop();
}

function showNoSupport() {
  document.getElementById('hint').style.display = 'none';
  document.getElementById('noSup').style.display = 'block';
}

function stopCam() {
  if (raf) { cancelAnimationFrame(raf); raf = null; }
  if (stream) { stream.getTracks().forEach(function(t) { t.stop(); }); stream = null; }
}

function closeScanner() {
  stopCam();
  window.close();
}
</script>
</body>
</html>
